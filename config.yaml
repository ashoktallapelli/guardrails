# Guardrails Configuration
# ========================
# Pluggable architecture - add/remove/reorder checks here

# Checks to run (in order)
# Available: file_validation, nsfw, violence, hate_symbols, pii, faces
guardrails:
  - file_validation
  - nsfw
  - violence
  - hate_symbols
  - pii
  - faces

# File validation
allowed_mime_types:
  - "image/jpeg"
  - "image/png"
  - "image/webp"
  - "image/gif"

max_file_size_mb: 10

max_resolution:
  width: 4096
  height: 4096

# NSFW Detection
# Model options:
#   - "opennsfw2": ResNet-50 based, ~24MB, ~90% accuracy (default)
#   - "adamcodd": ViT based, ~330MB, ~96.5% accuracy (higher accuracy)
nsfw_model: "adamcodd"

# Model paths
# CLIP ViT-H/14 (LAION) - 78% accuracy, 3.7GB (FP16) / 7.4GB (FP32)
# Note: Total cache with all formats can reach 15-25GB
model_paths:
  clip: "laion/CLIP-ViT-H-14-laion2B-s32B-b79K"

# Model precision
# FP16 = half precision (1.8GB memory, faster inference)
# FP32 = full precision (3.7GB memory, baseline speed)
use_fp16: true

# Alternative CLIP models (uncomment to use):
#   clip: "openai/clip-vit-base-patch32"      # Default, 63% accuracy, 340MB (FP16)
#   clip: "openai/clip-vit-large-patch14"     # 75% accuracy, 890MB (FP16)
#   clip: "laion/CLIP-ViT-H-14-laion2B-s32B-b79K"  # Best, 78% accuracy, 3.7GB (FP16)

# Custom local paths (if models downloaded manually):
# macOS/Linux:
#   opennsfw2: "~/.opennsfw2/weights/open_nsfw_weights.h5"
#   adamcodd: "~/.cache/huggingface/hub/models--AdamCodd--vit-base-nsfw-detector/snapshots/main"
#
# Windows:
#   opennsfw2: "C:/Users/username/.opennsfw2/weights/open_nsfw_weights.h5"
#   adamcodd: "C:/Users/username/.cache/huggingface/hub/models--AdamCodd--vit-base-nsfw-detector/snapshots/main"

# Score ranges from 0.0 (safe) to 1.0 (explicit)
# Lower threshold = stricter filtering
nsfw_threshold: 0.80

# Violence/Safety Detection (CLIP ViT-H/14 zero-shot classification)
# Model: laion/CLIP-ViT-H-14-laion2B-s32B-b79K (78% accuracy)
# Combined unsafe score threshold (sum of all unsafe labels)
enable_violence_check: true
violence_threshold: 0.70

# Violence detection labels (configurable)
# First 2 labels are "safe" categories, rest are "unsafe"
# Unsafe score = sum of all labels after first 2
violence_labels:
  - "a safe, normal photograph"
  - "a document, text, screenshot"
  - "violence, gore, blood, injury, fighting"
  - "guns, weapons, knives, dangerous objects"
  - "self-harm, suicide, cutting"

# Hate Symbol Detection (CLIP ViT-H/14 zero-shot classification)
# Model: laion/CLIP-ViT-H-14-laion2B-s32B-b79K (78% accuracy)
enable_hate_symbol_check: true
hate_symbol_threshold: 0.75

# Hate symbol detection labels (configurable)
# First 2 labels are "safe" categories, rest are "unsafe"
# Customize based on region (e.g., exclude religious swastika in India)
hate_labels:
  - "a safe, normal photograph without symbols"
  - "a document, text, form, screenshot"
  - "nazi swastika tilted on red background, SS bolts, hitler salute"
  - "KKK imagery, white hood, burning cross, racist symbols"
  - "ISIS flag, terrorist symbols, extremist imagery"

# Regional examples (uncomment to use):
# For India (exclude religious swastika):
#   hate_labels:
#     - "a safe, normal photograph without symbols"
#     - "a document, text, form, screenshot"
#     - "nazi swastika tilted 45 degrees on red background, SS bolts"
#     - "KKK imagery, burning cross, racist symbols"
#     - "ISIS flag, terrorist symbols"

# Privacy features - Image
enable_pii_redaction: true
enable_face_blur: true
face_blur_kernel_size: 51  # Must be odd number; larger = more blur

# Privacy features - Text PII
enable_text_pii: true
pii_language: "en"
pii_score_threshold: 0.35  # Minimum confidence score (0.0-1.0) - lowered to catch phone numbers

# PII anonymization operator: replace, redact, mask, hash
pii_operator: "replace"

# Custom operator config per entity type (optional)
# pii_operator_config:
#   EMAIL:
#     type: "replace"
#     params: {"new_value": "[EMAIL_REDACTED]"}
#   PHONE_NUMBER:
#     type: "mask"
#     params: {"masking_char": "*", "chars_to_mask": 8}
#   PERSON:
#     type: "replace"
#     params: {"new_value": "<PERSON>"}

# Entity types to detect (null = all)
# pii_entity_types:
#   - "EMAIL_ADDRESS"
#   - "PHONE_NUMBER"
#   - "PERSON"
#   - "CREDIT_CARD"
#   - "US_SSN"
#   - "IP_ADDRESS"
#   - "LOCATION"

# Output settings
output_quality: 95  # JPEG quality (1-100)

# Logging
log_level: "INFO"
log_decisions_to_file: true
log_file_path: "guardrails_audit.log"

# Production settings
fail_closed: false        # true = reject on errors, false = allow on errors

# Environment settings (for HuggingFace/Transformers)
# Set to true after models are downloaded to prevent network calls
environment:
  hf_hub_offline: true               # Use cached models only (no network)
  transformers_offline: true         # Transformers offline mode
  hf_hub_disable_implicit_token: true  # Disable token checks
