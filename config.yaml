# Image Guardrails Configuration
# ================================
# Adjust these thresholds based on your use case

# File validation
allowed_mime_types:
  - "image/jpeg"
  - "image/png"
  - "image/webp"
  - "image/gif"

max_file_size_mb: 10

max_resolution:
  width: 4096
  height: 4096

# NSFW Detection
# Model options:
#   - "opennsfw2": ResNet-50 based, ~24MB, ~90% accuracy (default)
#   - "adamcodd": ViT based, ~330MB, ~96.5% accuracy (higher accuracy)
nsfw_model: "opennsfw2"

# Score ranges from 0.0 (safe) to 1.0 (explicit)
# Lower threshold = stricter filtering
nsfw_threshold: 0.80

# Violence/Safety Detection (LAION-SAFETY style using CLIP)
# Uses zero-shot classification to detect:
#   - violence, gore, blood, injury
#   - weapons (guns, knives)
#   - disturbing/graphic content
# Combined unsafe score threshold (violence + weapons + disturbing)
enable_violence_check: true
violence_threshold: 0.70

# Hate Symbol Detection (CLIP zero-shot classification)
# Detects extremist imagery, nazi symbols, racist symbols
enable_hate_symbol_check: true
hate_symbol_threshold: 0.75

# Privacy features - Image
enable_pii_redaction: true
enable_face_blur: true
face_blur_kernel_size: 51  # Must be odd number; larger = more blur

# Privacy features - Text PII
enable_text_pii: true
pii_language: "en"
pii_score_threshold: 0.5   # Minimum confidence score (0.0-1.0)

# PII anonymization operator: replace, redact, mask, hash
pii_operator: "replace"

# Custom operator config per entity type (optional)
# pii_operator_config:
#   EMAIL:
#     type: "replace"
#     params: {"new_value": "[EMAIL_REDACTED]"}
#   PHONE_NUMBER:
#     type: "mask"
#     params: {"masking_char": "*", "chars_to_mask": 8}
#   PERSON:
#     type: "replace"
#     params: {"new_value": "<PERSON>"}

# Entity types to detect (null = all)
# pii_entity_types:
#   - "EMAIL_ADDRESS"
#   - "PHONE_NUMBER"
#   - "PERSON"
#   - "CREDIT_CARD"
#   - "US_SSN"
#   - "IP_ADDRESS"
#   - "LOCATION"

# Output settings
output_quality: 95  # JPEG quality (1-100)

# Logging
log_level: "INFO"
log_decisions_to_file: false
log_file_path: "guardrails_audit.log"

# Environment settings (for HuggingFace/Transformers)
# Set to false if you need to download models
environment:
  hf_hub_offline: true              # Use cached models only (no network)
  transformers_offline: true        # Transformers offline mode
  hf_hub_disable_implicit_token: true  # Disable token checks
